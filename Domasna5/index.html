<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather card</title>
  <link rel="stylesheet" href="/Domasna6/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD" crossorigin="anonymous" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Anton&family=Arimo:ital,wght@0,400..700;1,400..700&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Saira:ital,wdth,wght@0,75,200;1,75,200&family=Strait&display=swap"
    rel="stylesheet" />
</head>

<body>
  <div class="card">
    <img class="card-img" src="/Domasna6/pozadina.png" alt="" />

    <div class="weather-img">
      <img src="/Domasna6/thunder.png" alt="" />
      <div class="city">
        <span><i class="bi bi-geo-alt-fill"></i></span>
        <span>London</span>
      </div>
      <h1 id="today">Wednesday - Nov 11</h1>
      <h1 id="time">22:45 PM</h1>

      <div class="weather-info">
        <p>Feels like: 7*</p>
        <p>Wind: N 5mhp</p>
        <span> Sunrise: 05:45AM</span> <span>Sunset: 06:25PM</span>
      </div>

      <div class="current-day">
        <span>23&deg;C</span>
        <p>Thunder</p>
      </div>



      <div class="hr"></div>

    </div>

    <div class="this-week">
      <div class="following-days">
        <p>WED</p>
        <img src="/Domasna6/rainy.png" alt="">
        <p>28*/23*</p>
      </div>
      <div class="following-days">
        <p>THU</p>
        <img src="/Domasna6/cloudy.png" alt="">
        <p>32*/28*</p>
      </div>
      <div class="following-days">
        <p>FRI </p>
        <img src="/Domasna6/sunny.png" alt="">
        <p>34*/29*</p>
      </div>
      <div class="following-days">
        <p>SAT</p>
        <img src="/Domasna6/cloudy.png" alt="">
        <p>25*/15*</p>
      </div>
      <div class="following-days">
        <p>SUN</p>
        <img src="/Domasna6/sunny.png" alt="">
        <p>35*/29*</p>
      </div>
    </div>

    <div class="cloud">
      <img src="/Domasna6/cloud.png" alt="" />
    </div>

    <div class="icons">
      <i class="bi bi-cloud-sun-fill"></i>
      <p>Weather</p>

      <i class="bi bi-bell"></i>
      <p>Alert</p>

      <i class="bi bi-clock"></i>
      <p>Time</p>

     <i class="bi bi-geo-fill"></i>
      <p>City</p>

    </div>

  </div>
</body>

</html>
